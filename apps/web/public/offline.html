<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 0; padding: 2rem; background:#0b0b0c; color:#e5e7eb; }
      .card { max-width: 560px; margin: 10vh auto; background:#111113; border:1px solid #1f1f21; border-radius: 12px; padding: 24px; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1rem; color:#a1a1aa; }
      button { background:#1f2937; color:#fff; border:0; padding:0.6rem 0.9rem; border-radius:8px; cursor:pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Content may be limited. Please reconnect to access the latest version.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
